# SonarCloud configuration for InfraFlowSculptor
sonar.projectKey=FlorianDrevet_infra-pipeline-editor
sonar.organization=floriandrevet

# Exclude auto-generated EF Core migrations from duplication analysis
sonar.cpd.exclusions=**/Migrations/**,**/Persistence/Migrations/**

# Exclude tooling, seed scripts and third-party inline snippets from analysis
# - PL/SQL seed snapshot: hand-written test fixture, not production code
# - .github/skills/draw-io scripts: optional dev tooling, not shipped
# - Front index.html Clarity snippet: vendor-provided telemetry tag
sonar.exclusions=scripts/seed-project-snapshot.sql,.github/skills/draw-io-diagram-generator/scripts/**,src/Front/src/index.html

# Per-file rule suppressions (false positives or intentional design decisions)
# e1: Angular event bindings (keydown.enter), (keydown.space) are valid keyboard handlers
#     but the Sonar HTML parser does not recognize them as such; the templates already
#     have proper keyboard support via the .enter/.space pseudo-events.
# e2-e7: typescript:S3776 cognitive complexity in large feature components — refactoring
#     deferred (tracked under test-debt #22) until dedicated specs cover these surfaces.
#     Per-file suppression is used because the Sonar-reported line numbers have drifted
#     and inline `// NOSONAR` markers cannot be reliably anchored.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7
sonar.issue.ignore.multicriteria.e1.ruleKey=Web:MouseEventWithoutKeyboardEquivalentCheck
sonar.issue.ignore.multicriteria.e1.resourceKey=src/Front/**/*.html
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e2.resourceKey=src/Front/src/app/features/project-detail/project-detail.component.ts
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e3.resourceKey=src/Front/src/app/features/config-detail/config-detail.component.ts
sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=src/Front/src/app/features/config-detail/add-resource-dialog/add-resource-dialog.component.ts
sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e5.resourceKey=src/Front/src/app/features/resource-edit/add-app-config-key-dialog/add-app-config-key-dialog.component.ts
sonar.issue.ignore.multicriteria.e6.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e6.resourceKey=src/Front/src/app/features/resource-edit/add-app-setting-dialog/add-app-setting-dialog.component.ts
sonar.issue.ignore.multicriteria.e7.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e7.resourceKey=src/Front/src/app/features/resource-edit/resource-edit.component.ts
