<div class="layout-step">
  <header class="layout-step__header">
    <h3>{{ 'PROJECT_CREATE.STEP.LAYOUT.TITLE' | translate }}</h3>
  </header>

  <div class="layout-step__cards" role="radiogroup">
    @for (option of options; track option.value) {
      <button
        type="button"
        class="layout-card"
        role="radio"
        [class.layout-card--selected]="selected() === option.value"
        [attr.aria-checked]="selected() === option.value"
        (click)="select(option.value)"
      >
        <span class="layout-card__icon-wrap" aria-hidden="true">
          <mat-icon class="layout-card__icon">{{ option.icon }}</mat-icon>
        </span>
        <span class="layout-card__body">
          <span class="layout-card__title-row">
            <span class="layout-card__title">{{ option.titleKey | translate }}</span>
          </span>
          <span class="layout-card__desc">{{ option.descKey | translate }}</span>
        </span>
      </button>
    }
  </div>
</div>
