<h2 mat-dialog-title>
  {{ 'CONFIG_DETAIL.RESOURCE_GROUPS.ADD_DIALOG_TITLE' | translate }}
</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="rg-form" (ngSubmit)="onSubmit()">
    <app-ds-text-field
      class="full-width"
      formControlName="name"
      [label]="'CONFIG_DETAIL.RESOURCE_GROUPS.FORM.NAME' | translate"
      [placeholder]="'CONFIG_DETAIL.RESOURCE_GROUPS.FORM.NAME_PLACEHOLDER' | translate" />

    <app-ds-select
      class="full-width"
      formControlName="location"
      [label]="'CONFIG_DETAIL.RESOURCE_GROUPS.FORM.LOCATION' | translate"
      [options]="locationOptions" />

    @if (errorKey()) {
      <p class="dialog-error">{{ errorKey() | translate }}</p>
    }
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="onCancel()" [disabled]="isSubmitting()">
    {{ 'CONFIG_DETAIL.RESOURCE_GROUPS.FORM.CANCEL' | translate }}
  </button>
  <app-ds-button variant="primary" [loading]="isSubmitting()" [disabled]="form.invalid" (clicked)="onSubmit()">
    {{ 'CONFIG_DETAIL.RESOURCE_GROUPS.FORM.ADD' | translate }}
  </app-ds-button>
</mat-dialog-actions>
