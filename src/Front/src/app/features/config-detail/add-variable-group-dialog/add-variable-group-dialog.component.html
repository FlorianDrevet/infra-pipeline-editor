<h2 mat-dialog-title>
  {{ 'CONFIG_DETAIL.PIPELINE_VARIABLES.ADD_GROUP' | translate }}
</h2>

<mat-dialog-content>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'CONFIG_DETAIL.PIPELINE_VARIABLES.GROUP_NAME' | translate }}</mat-label>
      <input matInput formControlName="groupName"
        [placeholder]="'CONFIG_DETAIL.PIPELINE_VARIABLES.GROUP_NAME_PLACEHOLDER' | translate" />
      <mat-hint>{{ 'CONFIG_DETAIL.PIPELINE_VARIABLES.GROUP_NAME_HINT' | translate }}</mat-hint>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="onCancel()">
    {{ 'CONFIG_DETAIL.PIPELINE_VARIABLES.DIALOG_CANCEL' | translate }}
  </button>
  <app-ds-button variant="primary" [disabled]="form.invalid" (clicked)="onSubmit()">
    {{ 'CONFIG_DETAIL.PIPELINE_VARIABLES.DIALOG_ADD' | translate }}
  </app-ds-button>
</mat-dialog-actions>
