<h2 mat-dialog-title>{{ 'PROJECT_DETAIL.CONFIGS.ADD_DIALOG_TITLE' | translate }}</h2>

<mat-dialog-content>
  <p class="dialog-description">{{ 'PROJECT_DETAIL.CONFIGS.ADD_DIALOG_DESCRIPTION' | translate }}</p>

  @if (errorKey()) {
    <p class="dialog-error">{{ errorKey() | translate }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" id="add-config-form">
    <app-ds-text-field
      class="full-width"
      formControlName="name"
      [label]="'PROJECT_DETAIL.CONFIGS.FORM.NAME' | translate"
      [placeholder]="'PROJECT_DETAIL.CONFIGS.FORM.NAME_PLACEHOLDER' | translate"
      [error]="
        nameControl.touched && nameControl.hasError('required')
          ? ('HOME.FORM.ERROR_REQUIRED' | translate)
          : (nameControl.touched && nameControl.hasError('minlength')
              ? ('HOME.FORM.ERROR_MIN_LENGTH' | translate)
              : undefined)
      " />
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="onCancel()" [disabled]="isSubmitting()">
    {{ 'PROJECT_DETAIL.CONFIGS.FORM.CANCEL' | translate }}
  </button>
  <button mat-flat-button color="primary" type="submit" form="add-config-form" [disabled]="form.invalid || isSubmitting()">
    @if (isSubmitting()) {
      <mat-spinner diameter="18"></mat-spinner>
    } @else {
      {{ 'PROJECT_DETAIL.CONFIGS.FORM.ADD' | translate }}
    }
  </button>
</mat-dialog-actions>
