<div class="configs-list-container">
  <div class="header">
    <div class="header-content">
      <h1>Infrastructure Configurations</h1>
      <p class="subtitle">Manage your Azure infrastructure configurations</p>
    </div>
    <button mat-raised-button color="primary" (click)="createNewConfig()">
      <mat-icon>add</mat-icon>
      New Configuration
    </button>
  </div>

  <!-- Loading state -->
  <app-loading-spinner
    *ngIf="isLoading()"
    [diameter]="50"
    message="Loading configurations..."
  ></app-loading-spinner>

  <!-- Error state -->
  <div class="error-banner" *ngIf="error()">
    <mat-icon>error_outline</mat-icon>
    <p>{{ error() }}</p>
  </div>

  <!-- Content -->
  <div *ngIf="!isLoading() && !error()" class="content">
    <!-- Cards grid -->
    <div class="cards-grid" *ngIf="configurations().length > 0">
      <app-config-card
        *ngFor="let config of configurations()"
        [config]="config"
        (click)="openConfig(config.id)"
        class="card-item"
      ></app-config-card>
    </div>

    <!-- Empty state -->
    <app-empty-state
      *ngIf="configurations().length === 0"
      icon="devices_other"
      title="No configurations yet"
      description="Create a new configuration to get started."
      actionLabel="Create Configuration"
    ></app-empty-state>
  </div>
</div>
