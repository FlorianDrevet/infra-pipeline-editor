<app-card [clickable]="true" variant="elevated">
  <div class="header">
    <h2 class="title">{{ config.name }}</h2>
    <button mat-icon-button class="menu-btn">
      <mat-icon>more_vert</mat-icon>
    </button>
  </div>

  <div class="stats">
    <app-stat-item
      icon="storage"
      [value]="getResourcesCount()"
      label="Resources"
      color="primary"
    ></app-stat-item>

    <app-stat-item
      icon="cloud_queue"
      [value]="config.environmentDefinitions.length || 0"
      label="Environments"
      color="primary"
    ></app-stat-item>

    <app-stat-item
      icon="people"
      [value]="config.members.length || 0"
      label="Members"
      color="primary"
    ></app-stat-item>
  </div>

  <div class="members" *ngIf="config.members && config.members.length > 0">
    <p class="members-label">Team</p>
    <div class="member-avatars">
      <app-avatar
        *ngFor="let member of config.members | slice : 0 : 3"
        [initials]="getFirstMemberInitial(member.id)"
        size="sm"
        variant="primary"
        [tooltip]="member.id"
      ></app-avatar>
      <span class="more" *ngIf="config.members.length > 3">
        +{{ config.members.length - 3 }}
      </span>
    </div>
  </div>

  <div class="environments" *ngIf="config.environmentDefinitions && config.environmentDefinitions.length > 0">
    <p class="environments-label">Environments</p>
    <div class="env-tags">
      <mat-chip
        *ngFor="let env of config.environmentDefinitions | slice : 0 : 2"
        variant="outlined"
      >
        {{ env.name }}
      </mat-chip>
      <span class="more-envs" *ngIf="config.environmentDefinitions.length > 2">
        +{{ config.environmentDefinitions.length - 2 }}
      </span>
    </div>
  </div>

  <div class="actions">
    <button mat-button class="view-btn">
      View Details
      <mat-icon>arrow_forward</mat-icon>
    </button>
  </div>
</app-card>
