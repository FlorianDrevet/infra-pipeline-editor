<div class="empty-state" [class.full-height]="fullHeight">
  <mat-icon class="empty-icon">{{ icon }}</mat-icon>
  <h3 class="empty-title">{{ title }}</h3>
  <p class="empty-description" *ngIf="description">{{ description }}</p>
  <button mat-raised-button color="primary" *ngIf="actionLabel">
    {{ actionLabel }}
  </button>
</div>
