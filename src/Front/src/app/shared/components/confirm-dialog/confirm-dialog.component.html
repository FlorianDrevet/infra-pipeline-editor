<h2 mat-dialog-title>{{ data.titleKey | translate: data.titleParams }}</h2>
<mat-dialog-content>
  <p>{{ data.messageKey | translate: data.messageParams }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="onCancel()">{{ data.cancelKey | translate }}</button>
  <app-ds-button variant="danger" (clicked)="onConfirm()">{{ data.confirmKey | translate }}</app-ds-button>
</mat-dialog-actions>
