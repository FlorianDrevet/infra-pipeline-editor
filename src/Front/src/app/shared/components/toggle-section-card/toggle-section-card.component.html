<div class="toggle-card"
     [class.toggle-card--enabled]="enabled()"
     [class.toggle-card--disabled]="disabled()"
     [style.border-left-color]="enabled() ? accentColor() : 'transparent'">
  <div class="toggle-card__header">
    <div class="toggle-card__icon-wrapper" [style.background]="'rgba(21, 101, 192, 0.08)'">
      <mat-icon class="toggle-card__icon" [style.color]="accentColor()">{{ icon() }}</mat-icon>
    </div>
    <div class="toggle-card__titles">
      <span class="toggle-card__title">{{ title() }}</span>
      @if (subtitle()) {
        <span class="toggle-card__subtitle">{{ subtitle() }}</span>
      }
    </div>
    <mat-slide-toggle
      class="toggle-card__toggle"
      [checked]="enabled()"
      [disabled]="disabled()"
      (change)="enabledChange.emit($event.checked)">
    </mat-slide-toggle>
  </div>
  @if (enabled()) {
    <div class="toggle-card__body">
      <ng-content></ng-content>
    </div>
  }
</div>
