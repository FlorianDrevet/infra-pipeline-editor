@if (label()) {
  <span class="compact-select__label">{{ label() }}</span>
}

<div class="compact-select" cdkOverlayOrigin #trigger="cdkOverlayOrigin">
  <button type="button"
          class="compact-select__trigger"
          [class.compact-select__trigger--open]="isOpen()"
          [class.compact-select__trigger--disabled]="disabled()"
          [class.compact-select__trigger--placeholder]="!selectedOption()"
          [disabled]="disabled()"
          (click)="toggle()">
    @if (selectedOption()?.icon) {
      <mat-icon class="compact-select__trigger-icon">{{ selectedOption()!.icon }}</mat-icon>
    }
    <span class="compact-select__trigger-text">{{ displayText() }}</span>
    <mat-icon class="compact-select__chevron" [class.compact-select__chevron--open]="isOpen()">expand_more</mat-icon>
  </button>
</div>

<ng-template cdkConnectedOverlay
             [cdkConnectedOverlayOrigin]="trigger"
             [cdkConnectedOverlayOpen]="isOpen()"
             [cdkConnectedOverlayHasBackdrop]="true"
             cdkConnectedOverlayBackdropClass="compact-select__backdrop"
             (backdropClick)="close()"
             (detach)="close()">
  <div class="compact-select__panel">
    @if (options().length === 0) {
      <div class="compact-select__empty">{{ emptyText() }}</div>
    } @else {
      @for (option of options(); track option.value) {
        <button type="button"
                class="compact-select__option"
                [class.compact-select__option--selected]="option.value === value()"
                (click)="select(option)">
          @if (option.icon) {
            <mat-icon class="compact-select__option-icon">{{ option.icon }}</mat-icon>
          }
          <span class="compact-select__option-label">{{ option.label }}</span>
          @if (option.value === value()) {
            <mat-icon class="compact-select__check">check</mat-icon>
          }
        </button>
      }
    }
  </div>
</ng-template>
