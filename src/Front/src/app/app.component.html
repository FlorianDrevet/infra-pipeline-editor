<div class="app-shell">
  @if (!isLoginPage()) {
    <app-navigation></app-navigation>
  }
  <main class="app-main" [class.app-main--login]="isLoginPage()">
    <router-outlet></router-outlet>
  </main>
  @if (!isLoginPage()) {
    <app-footer></app-footer>
  }

  <agent-ui-annotation #annotationRef theme="auto" output-level="standard"></agent-ui-annotation>

  @if (!isLoginPage()) {
    <button
      type="button"
      class="annotation-trigger"
      (click)="activateAnnotation()"
      [attr.aria-label]="'ANNOTATION.ACTIVATE_ARIA' | translate"
      [attr.title]="'ANNOTATION.ACTIVATE' | translate"
    >
      AI
    </button>
  }
</div>
