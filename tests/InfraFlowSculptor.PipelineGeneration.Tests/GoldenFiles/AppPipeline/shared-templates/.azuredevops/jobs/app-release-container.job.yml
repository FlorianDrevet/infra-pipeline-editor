# Release deployment job (per environment) for container-mode apps — Auto-generated by InfraFlowSculptor

parameters:
  - name: resourceName
    type: string
  - name: resourceType
    type: string
  - name: imageRepository
    type: string
  - name: promotionStrategy
    type: string
    default: 'AcrImport'
  - name: envShortName
    type: string
  - name: envName
    type: string

jobs:
  - deployment: Deploy_${{ parameters.envShortName }}
    displayName: 'Deploy ${{ parameters.resourceName }} to ${{ parameters.envName }}'
    environment: ${{ parameters.envShortName }}
    strategy:
      runOnce:
        deploy:
          steps:
            - checkout: none

            - template: ../steps/app-load-metadata.step.yml

            - template: ../steps/app-acr-promote.step.yml
              parameters:
                imageRepository: ${{ parameters.imageRepository }}
                promotionStrategy: ${{ parameters.promotionStrategy }}
                envShortName: ${{ parameters.envShortName }}

            - template: ../steps/app-deploy-container.step.yml
              parameters:
                resourceType: ${{ parameters.resourceType }}
                imageRepository: ${{ parameters.imageRepository }}