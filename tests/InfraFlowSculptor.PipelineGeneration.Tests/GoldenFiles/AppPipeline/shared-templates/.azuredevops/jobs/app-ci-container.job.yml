# CI job for container-mode applications — Auto-generated by InfraFlowSculptor

parameters:
  - name: resourceName
    type: string
  - name: configName
    type: string
  - name: resourceType
    type: string
  - name: imageRepository
    type: string
  - name: imageTagPattern
    type: string
    default: '{buildNumber}-{shortSha}'
  - name: dockerfilePath
    type: string
    default: 'Dockerfile'
  - name: buildContext
    type: string
    default: '.'
  - name: containerRegistryName
    type: string
    default: ''
  - name: acrAuthMode
    type: string
    default: 'ServiceConnection'
  - name: enableSecurityScans
    type: boolean
    default: true
  - name: promotionStrategy
    type: string
    default: 'AcrImport'

jobs:
  - job: BuildAndPush
    displayName: 'Build and push immutable image'
    steps:
      - checkout: self
        fetchDepth: 0

      - template: ../steps/app-compute-release-tag.step.yml
        parameters:
          imageTagPattern: ${{ parameters.imageTagPattern }}
          imageRepository: ${{ parameters.imageRepository }}
          configName: ${{ parameters.configName }}
          resourceName: ${{ parameters.resourceName }}
          resourceType: ${{ parameters.resourceType }}
          promotionStrategy: ${{ parameters.promotionStrategy }}
          containerRegistryName: ${{ parameters.containerRegistryName }}
          includeRegistryMetadata: true

      - template: ../steps/app-acr-login.step.yml
        parameters:
          acrAuthMode: ${{ parameters.acrAuthMode }}

      - template: ../steps/app-docker-buildx-push.step.yml
        parameters:
          dockerfilePath: ${{ parameters.dockerfilePath }}
          buildContext: ${{ parameters.buildContext }}
          imageRepository: ${{ parameters.imageRepository }}
          containerRegistryName: ${{ parameters.containerRegistryName }}

      - ${{ if parameters.enableSecurityScans }}:
        - template: ../steps/app-trivy-scan.step.yml
          parameters:
            imageRepository: ${{ parameters.imageRepository }}
            containerRegistryName: ${{ parameters.containerRegistryName }}

        - template: ../steps/app-syft-sbom.step.yml
          parameters:
            imageRepository: ${{ parameters.imageRepository }}
            containerRegistryName: ${{ parameters.containerRegistryName }}

      - task: PublishPipelineArtifact@1
        displayName: 'Publish app metadata'
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)/app-metadata'
          artifact: 'app-metadata'

      - ${{ if parameters.enableSecurityScans }}:
        - task: PublishPipelineArtifact@1
          displayName: 'Publish supply chain reports'
          inputs:
            targetPath: '$(Build.ArtifactStagingDirectory)/supply-chain'
            artifact: 'supply-chain'