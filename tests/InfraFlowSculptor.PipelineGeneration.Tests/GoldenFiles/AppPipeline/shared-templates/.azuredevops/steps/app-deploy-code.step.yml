# Deploy application package to compute resource — Auto-generated by InfraFlowSculptor

parameters:
  - name: resourceType
    type: string

steps:
  - download: ci
    artifact: application-package
    displayName: 'Download application package'

  - ${{ if eq(parameters.resourceType, 'WebApp') }}:
    - task: AzureWebApp@1
      displayName: 'Deploy package to Web App'
      inputs:
        azureSubscription: $(azureResourceManagerConnection)
        appType: webApp
        appName: $(webAppName)
        package: $(Pipeline.Workspace)/application-package

  - ${{ if eq(parameters.resourceType, 'FunctionApp') }}:
    - task: AzureFunctionApp@2
      displayName: 'Deploy package to Function App'
      inputs:
        azureSubscription: $(azureResourceManagerConnection)
        appType: functionApp
        appName: $(functionAppName)
        package: $(Pipeline.Workspace)/application-package