# CI pipeline template for container-mode apps — Auto-generated by InfraFlowSculptor
# Usage: extends: template: ../../.azuredevops/pipelines/app-ci-container.pipeline.yml

parameters:
  - name: resourceName
    type: string
  - name: configName
    type: string
  - name: resourceType
    type: string
  - name: imageRepository
    type: string
  - name: imageTagPattern
    type: string
    default: '{buildNumber}-{shortSha}'
  - name: dockerfilePath
    type: string
    default: 'Dockerfile'
  - name: buildContext
    type: string
    default: '.'
  - name: containerRegistryName
    type: string
    default: ''
  - name: acrAuthMode
    type: string
    default: 'ServiceConnection'
  - name: enableSecurityScans
    type: boolean
    default: true
  - name: promotionStrategy
    type: string
    default: 'AcrImport'
  - name: buildSourceEnvVariablesPath
    type: string
    default: ''
  - name: variableGroups
    type: object
    default: []
  - name: agentPoolName
    type: string
    default: ''

pool:
  ${{ if eq(parameters.agentPoolName, '') }}:
    vmImage: 'ubuntu-latest'
  ${{ if ne(parameters.agentPoolName, '') }}:
    name: '${{ parameters.agentPoolName }}'

stages:
  - stage: Build
    displayName: 'Build, scan and publish image'
    ${{ if ne(parameters.buildSourceEnvVariablesPath, '') }}:
      variables:
        - template: ${{ parameters.buildSourceEnvVariablesPath }}
        - ${{ each group in parameters.variableGroups }}:
          - group: ${{ group }}
    jobs:
      - template: ../jobs/app-ci-container.job.yml
        parameters:
          resourceName: ${{ parameters.resourceName }}
          configName: ${{ parameters.configName }}
          resourceType: ${{ parameters.resourceType }}
          imageRepository: ${{ parameters.imageRepository }}
          imageTagPattern: ${{ parameters.imageTagPattern }}
          dockerfilePath: ${{ parameters.dockerfilePath }}
          buildContext: ${{ parameters.buildContext }}
          containerRegistryName: ${{ parameters.containerRegistryName }}
          acrAuthMode: ${{ parameters.acrAuthMode }}
          enableSecurityScans: ${{ parameters.enableSecurityScans }}
          promotionStrategy: ${{ parameters.promotionStrategy }}