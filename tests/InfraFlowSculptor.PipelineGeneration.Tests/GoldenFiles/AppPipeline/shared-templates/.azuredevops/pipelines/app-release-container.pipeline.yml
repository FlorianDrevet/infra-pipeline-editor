# Release pipeline template for container-mode apps — Auto-generated by InfraFlowSculptor
# Usage: extends: template: ../../.azuredevops/pipelines/app-release-container.pipeline.yml
#
# Each environment object must contain:
#   shortName, name, variablesPath, variableGroups (list of strings)

parameters:
  - name: resourceName
    type: string
  - name: resourceType
    type: string
  - name: imageRepository
    type: string
  - name: promotionStrategy
    type: string
    default: 'AcrImport'
  - name: agentPoolName
    type: string
    default: ''
  - name: environments
    type: object
    default: []

pool:
  ${{ if eq(parameters.agentPoolName, '') }}:
    vmImage: 'ubuntu-latest'
  ${{ if ne(parameters.agentPoolName, '') }}:
    name: '${{ parameters.agentPoolName }}'

stages:
  - ${{ each env in parameters.environments }}:
    - stage: Deploy_${{ env.shortName }}
      displayName: 'Promote and deploy to ${{ env.name }}'
      lockBehavior: sequential
      variables:
        - template: ${{ env.variablesPath }}
        - ${{ each group in env.variableGroups }}:
          - group: ${{ group }}
      jobs:
        - template: ../jobs/app-release-container.job.yml
          parameters:
            resourceName: ${{ parameters.resourceName }}
            resourceType: ${{ parameters.resourceType }}
            imageRepository: ${{ parameters.imageRepository }}
            promotionStrategy: ${{ parameters.promotionStrategy }}
            envShortName: ${{ env.shortName }}
            envName: ${{ env.name }}