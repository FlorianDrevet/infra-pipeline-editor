# Release pipeline template for code-mode apps — Auto-generated by InfraFlowSculptor
# Usage: extends: template: ../../.azuredevops/pipelines/app-release-code.pipeline.yml

parameters:
  - name: resourceName
    type: string
  - name: resourceType
    type: string
  - name: agentPoolName
    type: string
    default: ''
  - name: environments
    type: object
    default: []

pool:
  ${{ if eq(parameters.agentPoolName, '') }}:
    vmImage: 'ubuntu-latest'
  ${{ if ne(parameters.agentPoolName, '') }}:
    name: '${{ parameters.agentPoolName }}'

stages:
  - ${{ each env in parameters.environments }}:
    - stage: Deploy_${{ env.shortName }}
      displayName: 'Deploy to ${{ env.name }}'
      lockBehavior: sequential
      variables:
        - template: ${{ env.variablesPath }}
        - ${{ each group in env.variableGroups }}:
          - group: ${{ group }}
      jobs:
        - template: ../jobs/app-release-code.job.yml
          parameters:
            resourceName: ${{ parameters.resourceName }}
            resourceType: ${{ parameters.resourceType }}
            envShortName: ${{ env.shortName }}
            envName: ${{ env.name }}