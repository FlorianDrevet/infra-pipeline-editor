# CI pipeline template for code-mode apps — Auto-generated by InfraFlowSculptor
# Usage: extends: template: ../../.azuredevops/pipelines/app-ci-code.pipeline.yml

parameters:
  - name: resourceName
    type: string
  - name: configName
    type: string
  - name: resourceType
    type: string
  - name: imageRepository
    type: string
  - name: imageTagPattern
    type: string
    default: '{buildNumber}-{shortSha}'
  - name: runtimeStack
    type: string
    default: 'DOTNETCORE'
  - name: runtimeVersion
    type: string
    default: '8.0'
  - name: sourcePath
    type: string
    default: '.'
  - name: testCommand
    type: string
    default: ''
  - name: buildCommand
    type: string
    default: ''
  - name: promotionStrategy
    type: string
    default: 'AcrImport'
  - name: agentPoolName
    type: string
    default: ''

pool:
  ${{ if eq(parameters.agentPoolName, '') }}:
    vmImage: 'ubuntu-latest'
  ${{ if ne(parameters.agentPoolName, '') }}:
    name: '${{ parameters.agentPoolName }}'

stages:
  - stage: Build
    displayName: 'Build, test and publish package'
    jobs:
      - template: ../jobs/app-ci-code.job.yml
        parameters:
          resourceName: ${{ parameters.resourceName }}
          configName: ${{ parameters.configName }}
          resourceType: ${{ parameters.resourceType }}
          imageRepository: ${{ parameters.imageRepository }}
          imageTagPattern: ${{ parameters.imageTagPattern }}
          runtimeStack: ${{ parameters.runtimeStack }}
          runtimeVersion: ${{ parameters.runtimeVersion }}
          sourcePath: ${{ parameters.sourcePath }}
          testCommand: ${{ parameters.testCommand }}
          buildCommand: ${{ parameters.buildCommand }}
          promotionStrategy: ${{ parameters.promotionStrategy }}