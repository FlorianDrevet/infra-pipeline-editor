# Bootstrap Pipeline — generated by InfraFlowSculptor
# Infrastructure-side / standalone bootstrap. Owner of the shared project resources (environments, variable groups).
# Run this pipeline ONCE in Azure DevOps to provision the resources listed above.
# All scripts are idempotent — re-running skips already-existing resources.
#
# Prerequisites:
#   - The pipeline/job must expose $(System.AccessToken) to scripts
#   - The build service identity must be allowed to manage pipelines, environments, and variable groups
#   - The build service identity must also have Use permission on any agent pool referenced by the generated YAML
#   - Service connections configured per environment in Azure DevOps
#   - Azure CLI with azure-devops extension available on agent
#   - Approval-required environments are created automatically, but approver identities must still be configured manually in Azure DevOps

trigger: none

name: bootstrap-$(Date:yyyyMMdd)$(Rev:.r)

variables:
  organizationUrl: 'https://dev.azure.com/contoso'
  projectName: 'ifs'
  repositoryName: 'ifs'
  defaultBranch: 'main'

stages:
- stage: BootstrapAzureDevOps
  displayName: 'Bootstrap Azure DevOps'
  jobs:
    - job: ProvisionPipelineDefinitions
      displayName: 'Provision Pipeline Definitions'
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        # ── Configure Azure DevOps CLI ─────────────────────────────────────────
        - powershell: |
            $ErrorActionPreference = 'Stop'
            $null = az config set extension.use_dynamic_install=yes_without_prompt
            $null = az config set extension.dynamic_install_allow_preview=false
            $null = az extension show --name azure-devops 2>$null
            if ($LASTEXITCODE -ne 0) {
              $null = az extension add --name azure-devops --yes
            }
            $null = az devops configure --defaults organization="$(organizationUrl)" project="$(projectName)"
          displayName: 'Configure Azure DevOps CLI'
          env:
            AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

  # ── Create pipeline definitions ─────────────────────────────────────────
        - powershell: |
            $ErrorActionPreference = 'Stop'
            $existing = az pipelines list --folder-path '\Core' --query "[?name=='Core - CI'].id | [0]" -o tsv --detect false
            if ([string]::IsNullOrWhiteSpace($existing)) {
              $previousErrorActionPreference = $ErrorActionPreference
              try {
                $ErrorActionPreference = 'Continue'
                $createOutput = @(az pipelines create --name 'Core - CI' --repository "$(repositoryName)" --repository-type tfsgit --branch "$(defaultBranch)" --yml-path '.azuredevops/core/ci.pipeline.yml' --folder-path '\Core' --skip-first-run true --query 'id' -o tsv --only-show-errors --detect false 2>&1)
                $createExitCode = $LASTEXITCODE
              }
              finally {
                $ErrorActionPreference = $previousErrorActionPreference
              }
              $createdId = (($createOutput | ForEach-Object { $_.ToString().Trim() } | Where-Object { $_ -match '^\d+$' } | Select-Object -Last 1) | Out-String).Trim()
              if ($createExitCode -ne 0 -or [string]::IsNullOrWhiteSpace($createdId)) {
                $details = ($createOutput | Out-String).Trim()
                if ([string]::IsNullOrWhiteSpace($details)) {
                  $details = 'No output returned by Azure DevOps CLI.'
                }
                throw 'Failed to create pipeline Core - CI. Ensure the Azure DevOps identity used by System.AccessToken has the Create build pipeline permission on path \Core and Use permission on the agent pool referenced by .azuredevops/core/ci.pipeline.yml. Azure DevOps CLI output: ' + $details
              }
              Write-Host ('Created pipeline: Core - CI (ID: ' + $createdId + ')')
            }
            else {
              Write-Host ('Pipeline already exists: Core - CI (ID: ' + $existing + ')')
            }
          displayName: 'Create Pipeline: Core - CI'
          env:
            AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

    - job: ProvisionEnvironments
      displayName: 'Provision Environments'
      pool:
        vmImage: 'ubuntu-latest'
      steps:
  # ── Create Azure DevOps environments ───────────────────────────────────
        - powershell: |
            $ErrorActionPreference = 'Stop'
            $encodedProjectName = [Uri]::EscapeDataString("$(projectName)")
            $headers = @{ Authorization = "Bearer $(System.AccessToken)" }
            $environmentUri = "$(organizationUrl)/$encodedProjectName/_apis/distributedtask/environments?api-version=7.1"
            $existingResponse = Invoke-RestMethod -Method Get -Uri $environmentUri -Headers $headers -ContentType 'application/json'
            $existing = @($existingResponse.value | Where-Object { $_.name -eq 'ifs-dev' } | Select-Object -First 1)
            if ($existing.Count -eq 0) {
              $body = @{
                name = 'ifs-dev'
                description = 'Generated from InfraFlowSculptor environment ''Development''. Approval required in app: no.'
              } | ConvertTo-Json
              $created = Invoke-RestMethod -Method Post -Uri $environmentUri -Headers $headers -Body $body -ContentType 'application/json'
              Write-Host ('Created environment: ifs-dev (ID: ' + $created.id + ')')
            }
            else {
              Write-Host ('Environment already exists: ifs-dev (ID: ' + $existing[0].id + ')')
            }
          displayName: 'Create Environment: ifs-dev'
          env:
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

    - job: ProvisionVariableGroups
      displayName: 'Provision Variable Groups'
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        # ── Configure Azure DevOps CLI ─────────────────────────────────────────
        - powershell: |
            $ErrorActionPreference = 'Stop'
            $null = az config set extension.use_dynamic_install=yes_without_prompt
            $null = az config set extension.dynamic_install_allow_preview=false
            $null = az extension show --name azure-devops 2>$null
            if ($LASTEXITCODE -ne 0) {
              $null = az extension add --name azure-devops --yes
            }
            $null = az devops configure --defaults organization="$(organizationUrl)" project="$(projectName)"
          displayName: 'Configure Azure DevOps CLI'
          env:
            AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

  # ── Create variable groups ──────────────────────────────────────────────
        - powershell: |
            $ErrorActionPreference = 'Stop'
            $existingId = az pipelines variable-group list --query "[?name=='ifs-core-dev'].id | [0]" -o tsv --detect false 2>$null
            $groupCreated = $false
            if ([string]::IsNullOrWhiteSpace($existingId)) {
              $null = az pipelines variable-group create --name 'ifs-core-dev' --variables 'LOG_LEVEL=Information' --detect false
              $vgId = az pipelines variable-group list --query "[?name=='ifs-core-dev'].id | [0]" -o tsv --detect false
              if ([string]::IsNullOrWhiteSpace($vgId)) {
                throw 'Unable to resolve variable group id after creation: ifs-core-dev'
              }
              $groupCreated = $true
            }
            else {
              $vgId = $existingId
            }
            $existingVariablesJson = az pipelines variable-group variable list --group-id $vgId -o json --detect false
            $existingVariableNames = @()
            if (-not [string]::IsNullOrWhiteSpace($existingVariablesJson) -and $existingVariablesJson -ne '{}') {
              $existingVariables = $existingVariablesJson | ConvertFrom-Json
              $existingVariableNames = @($existingVariables.PSObject.Properties.Name)
            }
            if (-not ($existingVariableNames -contains 'LOG_LEVEL')) {
              $null = az pipelines variable-group variable create --group-id $vgId --name 'LOG_LEVEL' --value 'Information' --detect false
              $existingVariableNames += 'LOG_LEVEL'
            }
            if (-not ($existingVariableNames -contains 'JWT_SECRET')) {
              $null = az pipelines variable-group variable create --group-id $vgId --name 'JWT_SECRET' --value ' ' --secret true --detect false
              $existingVariableNames += 'JWT_SECRET'
            }
            if (($existingVariableNames -contains 'PLACEHOLDER') -and $existingVariableNames.Count -gt 1) {
              $null = az pipelines variable-group variable delete --group-id $vgId --name PLACEHOLDER --yes --detect false
              $existingVariableNames = @($existingVariableNames | Where-Object { $_ -ne 'PLACEHOLDER' })
            }
            if ($groupCreated) {
              Write-Host ('Created variable group: ifs-core-dev (ID: ' + $vgId + ')')
            }
            else {
              Write-Host ('Variable group already exists: ifs-core-dev (ID: ' + $vgId + ')')
            }
            Write-Host ('Ensured variables for group ifs-core-dev: ' + $existingVariableNames.Count)
          displayName: 'Create Variable Group: ifs-core-dev'
          env:
            AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

