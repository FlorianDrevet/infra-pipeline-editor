# Bootstrap Pipeline — generated by InfraFlowSculptor
# Application-side bootstrap (SplitInfraCode). Validates shared project resources, then provisions application pipelines only.
# Run this pipeline ONCE in Azure DevOps to provision the resources listed above.
# All scripts are idempotent — re-running skips already-existing resources.
#
# Prerequisites:
#   - The pipeline/job must expose $(System.AccessToken) to scripts
#   - The build service identity must be allowed to manage pipelines, environments, and variable groups
#   - The build service identity must also have Use permission on any agent pool referenced by the generated YAML
#   - Service connections configured per environment in Azure DevOps
#   - Azure CLI with azure-devops extension available on agent
#   - Environments and variable groups must have been provisioned by the infra bootstrap first

trigger: none

name: bootstrap-$(Date:yyyyMMdd)$(Rev:.r)

variables:
  organizationUrl: 'https://dev.azure.com/contoso'
  projectName: 'ifs'
  repositoryName: 'ifs'
  defaultBranch: 'main'

stages:
- stage: BootstrapAzureDevOps
  displayName: 'Bootstrap Azure DevOps'
  jobs:
    - job: ValidateSharedResources
      displayName: 'Validate Shared Project Resources'
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        # ── Configure Azure DevOps CLI ─────────────────────────────────────────
        - powershell: |
            $ErrorActionPreference = 'Stop'
            $null = az config set extension.use_dynamic_install=yes_without_prompt
            $null = az config set extension.dynamic_install_allow_preview=false
            $null = az extension show --name azure-devops 2>$null
            if ($LASTEXITCODE -ne 0) {
              $null = az extension add --name azure-devops --yes
            }
            $null = az devops configure --defaults organization="$(organizationUrl)" project="$(projectName)"
          displayName: 'Configure Azure DevOps CLI'
          env:
            AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

  # ── Validate shared project resources owned by the infra bootstrap ──────
        - powershell: |
            $ErrorActionPreference = 'Stop'
            $missing = @()
            $encodedProjectName = [Uri]::EscapeDataString("$(projectName)")
            $headers = @{ Authorization = "Bearer $(System.AccessToken)" }
            $environmentUri = "$(organizationUrl)/$encodedProjectName/_apis/distributedtask/environments?api-version=7.1"
            $environmentsResponse = Invoke-RestMethod -Method Get -Uri $environmentUri -Headers $headers -ContentType 'application/json'
            $existingEnvironmentNames = @()
            if ($environmentsResponse.value) { $existingEnvironmentNames = @($environmentsResponse.value | ForEach-Object { $_.name }) }
            if (-not ($existingEnvironmentNames -contains 'ifs-dev')) { $missing += 'environment:ifs-dev' }
            $existingGroupsJson = az pipelines variable-group list -o json --detect false
            $existingGroupNames = @()
            if (-not [string]::IsNullOrWhiteSpace($existingGroupsJson)) {
              $existingGroups = $existingGroupsJson | ConvertFrom-Json
              if ($existingGroups) { $existingGroupNames = @($existingGroups | ForEach-Object { $_.name }) }
            }
            if (-not ($existingGroupNames -contains 'ifs-core-dev')) { $missing += 'variableGroup:ifs-core-dev' }
            if ($missing.Count -gt 0) {
              Write-Host '##[error]Missing shared project resources: ' ($missing -join ', ')
              throw 'Shared project resources are missing. Run the infrastructure bootstrap pipeline first to provision the listed environments and variable groups.'
            }
            Write-Host 'Shared project resources validated.'
          displayName: 'Validate shared project resources'
          env:
            AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

    - job: ProvisionPipelineDefinitions
      displayName: 'Provision Pipeline Definitions'
      dependsOn: ValidateSharedResources
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        # ── Configure Azure DevOps CLI ─────────────────────────────────────────
        - powershell: |
            $ErrorActionPreference = 'Stop'
            $null = az config set extension.use_dynamic_install=yes_without_prompt
            $null = az config set extension.dynamic_install_allow_preview=false
            $null = az extension show --name azure-devops 2>$null
            if ($LASTEXITCODE -ne 0) {
              $null = az extension add --name azure-devops --yes
            }
            $null = az devops configure --defaults organization="$(organizationUrl)" project="$(projectName)"
          displayName: 'Configure Azure DevOps CLI'
          env:
            AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

  # ── Create pipeline definitions ─────────────────────────────────────────
        - powershell: |
            $ErrorActionPreference = 'Stop'
            $existing = az pipelines list --folder-path '\Apps' --query "[?name=='App - CI'].id | [0]" -o tsv --detect false
            if ([string]::IsNullOrWhiteSpace($existing)) {
              $previousErrorActionPreference = $ErrorActionPreference
              try {
                $ErrorActionPreference = 'Continue'
                $createOutput = @(az pipelines create --name 'App - CI' --repository "$(repositoryName)" --repository-type tfsgit --branch "$(defaultBranch)" --yml-path '.azuredevops/apps/ci.pipeline.yml' --folder-path '\Apps' --skip-first-run true --query 'id' -o tsv --only-show-errors --detect false 2>&1)
                $createExitCode = $LASTEXITCODE
              }
              finally {
                $ErrorActionPreference = $previousErrorActionPreference
              }
              $createdId = (($createOutput | ForEach-Object { $_.ToString().Trim() } | Where-Object { $_ -match '^\d+$' } | Select-Object -Last 1) | Out-String).Trim()
              if ($createExitCode -ne 0 -or [string]::IsNullOrWhiteSpace($createdId)) {
                $details = ($createOutput | Out-String).Trim()
                if ([string]::IsNullOrWhiteSpace($details)) {
                  $details = 'No output returned by Azure DevOps CLI.'
                }
                throw 'Failed to create pipeline App - CI. Ensure the Azure DevOps identity used by System.AccessToken has the Create build pipeline permission on path \Apps and Use permission on the agent pool referenced by .azuredevops/apps/ci.pipeline.yml. Azure DevOps CLI output: ' + $details
              }
              Write-Host ('Created pipeline: App - CI (ID: ' + $createdId + ')')
            }
            else {
              Write-Host ('Pipeline already exists: App - CI (ID: ' + $existing + ')')
            }
          displayName: 'Create Pipeline: App - CI'
          env:
            AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

