# Release Pipeline — Auto-generated by InfraFlowSculptor
name: $(date:yyyyMMdd)

trigger: none

resources:
  pipelines:
    - pipeline: ci
      source: 'shared - CI'
      trigger: none

variables:
  - name: environments
    value: dev,prod

pool:
  vmImage: 'ubuntu-latest'

stages:
  - ${{ each environment in split(variables.environments, ',') }}:
      - stage: "Deploy_${{ environment }}"
        displayName: "Deploy ${{ environment }}"
        variables:
          - group: ifs-shared-dev

        jobs:
          - template: ../Common/jobs/deploy.job.yml
            parameters:
              projectName: shared
              environment: ${{ environment }}
              deployments:
                - displayName: "Deploy shared Infrastructure"
                  deploymentName: shared-infra-$(Build.BuildNumber)
                  templateFile: $(Pipeline.Workspace)/ci/drop/shared/main.bicep
                  templateParametersFile: $(Pipeline.Workspace)/ci/drop/shared/parameters/main.${{environment}}.bicepparam
                  overrideParameters: -sqlServerAdministratorLoginPassword $(SqlAdminPassword) -sqlServerAdministratorLoginPassword $(sqlServerAdministratorLoginPassword)
