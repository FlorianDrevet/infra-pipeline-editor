# Release Pipeline — Auto-generated by InfraFlowSculptor
name: $(date:yyyyMMdd)

trigger: none

resources:
  pipelines:
    - pipeline: ci
      source: 'core - CI'
      trigger: none

variables:
  - name: environments
    value: dev,prod

pool:
  vmImage: 'ubuntu-latest'

stages:
  - ${{ each environment in split(variables.environments, ',') }}:
      - stage: "Deploy_${{ environment }}"
        displayName: "Deploy ${{ environment }}"

        jobs:
          - template: ../Common/jobs/deploy.job.yml
            parameters:
              projectName: core
              environment: ${{ environment }}
              deployments:
                - displayName: "Deploy core Infrastructure"
                  deploymentName: core-infra-$(Build.BuildNumber)
                  templateFile: $(Pipeline.Workspace)/ci/drop/core/main.bicep
                  templateParametersFile: $(Pipeline.Workspace)/ci/drop/core/parameters/main.${{environment}}.bicepparam
