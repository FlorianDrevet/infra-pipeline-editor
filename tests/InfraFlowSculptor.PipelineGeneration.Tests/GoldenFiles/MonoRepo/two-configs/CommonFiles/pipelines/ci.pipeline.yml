# Shared CI Pipeline Template — Auto-generated by InfraFlowSculptor

parameters:
  - name: continueOnError
    type: boolean
    default: false
  - name: projectName
    type: string
    values:
      - core
      - shared

stages:
  - stage: Build
    displayName: 'Build & Publish Artifacts'
    jobs:
      - job: BuildBicep
        displayName: 'Build Bicep'
        pool:
          vmImage: 'ubuntu-latest'
        continueOnError: ${{ parameters.continueOnError }}
        steps:
          - template: ../steps/checkout.step.yml
            parameters:
              directories:
                - .azuredevops
                - Common
                - ${{ parameters.projectName }}

          - task: CopyFiles@2
            displayName: 'Copy Bicep files'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)'
              Contents: |
                **/*.bicep
                **/*.bicepparam
                **/*.json
              TargetFolder: '$(Build.ArtifactStagingDirectory)'

          - powershell: |
              $artifactRoot = '$(Build.ArtifactStagingDirectory)'
              $commonPath = Join-Path $artifactRoot 'Common'
              $projectPath = Join-Path $artifactRoot '${{ parameters.projectName }}'
              $mainBicepPath = Join-Path $projectPath 'main.bicep'

              if (-not (Test-Path -LiteralPath $artifactRoot)) {
                throw "Artifact staging directory not found: $artifactRoot"
              }

              Write-Host "Artifact staging contents:"
              Get-ChildItem -LiteralPath $artifactRoot -Recurse | Select-Object FullName | Format-Table -AutoSize | Out-String | Write-Host

              if (-not (Test-Path -LiteralPath $commonPath)) {
                throw "Common artifact folder not found: $commonPath"
              }

              if (-not (Test-Path -LiteralPath $projectPath)) {
                throw "Project artifact folder not found: $projectPath"
              }

              if (-not (Test-Path -LiteralPath $mainBicepPath)) {
                throw "Main Bicep file not found in artifact: $mainBicepPath"
              }
            displayName: 'Validate artifact contents'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'drop'
              publishLocation: 'Container'
