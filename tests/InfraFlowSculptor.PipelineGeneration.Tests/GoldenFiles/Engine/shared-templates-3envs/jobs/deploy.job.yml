# Shared Deploy Job Template — Auto-generated by InfraFlowSculptor

parameters:
  - name: projectName
    type: string
    values:
      - core
  - name: environment
    type: string
    values:
      - dev
      - qa
      - prod
  - name: deployments
    type: object
    default: []

jobs:
  - job: Deploy
    displayName: 'Deploy to ${{ parameters.environment }}'
    pool:
      vmImage: 'ubuntu-latest'
    variables:
      - template: ../variables/${{ parameters.environment }}.variables.yml
    steps:
      - checkout: none
      - download: ci
        artifact: drop
        displayName: 'Download CI Artifacts'

      - ${{ each deployment in parameters.deployments }}:
          - template: ../steps/deploy-template.step.yml
            parameters:
              azureResourceManagerConnection: ${{ variables.azureResourceManagerConnection }}
              subscriptionId: ${{ variables.subscriptionId }}
              location: ${{ variables.location }}
              deploymentName: ${{ deployment.deploymentName }}
              templateFile: '${{ deployment.templateFile }}'
              templateParametersFile: '${{ deployment.templateParametersFile }}'
              overrideParameters: ${{ deployment.overrideParameters }}
