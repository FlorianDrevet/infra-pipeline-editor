# Shared Deploy Step Template — Auto-generated by InfraFlowSculptor

parameters:
  - name: azureResourceManagerConnection
    type: string
  - name: subscriptionId
    type: string
  - name: location
    type: string
  - name: deploymentName
    type: string
  - name: templateFile
    type: string
  - name: templateParametersFile
    type: string
  - name: overrideParameters
    type: string
    default: ''

steps:
  - powershell: |
      $templateFile = '${{ parameters.templateFile }}'
      $parametersFile = '${{ parameters.templateParametersFile }}'

      if (-not (Test-Path -LiteralPath $templateFile)) {
        $templateDirectory = Split-Path -Path $templateFile -Parent
        if (Test-Path -LiteralPath $templateDirectory) {
          Write-Host "Template directory contents:"
          Get-ChildItem -LiteralPath $templateDirectory -Recurse | Select-Object FullName | Format-Table -AutoSize | Out-String | Write-Host
        }
        throw "Template file not found: $templateFile"
      }

      if (-not (Test-Path -LiteralPath $parametersFile)) {
        $parametersDirectory = Split-Path -Path $parametersFile -Parent
        $fallbackFiles = @()
        if (Test-Path -LiteralPath $parametersDirectory) {
          Write-Host "Parameters directory contents:"
          Get-ChildItem -LiteralPath $parametersDirectory -Recurse | Select-Object FullName | Format-Table -AutoSize | Out-String | Write-Host
          $fallbackFiles = @(Get-ChildItem -LiteralPath $parametersDirectory -Filter 'main.*.bicepparam' -File)
        }

        if ($fallbackFiles.Count -eq 1) {
          $parametersFile = $fallbackFiles[0].FullName
          Write-Warning "Expected parameters file not found. Falling back to: $parametersFile"
        }
        else {
          throw "Parameters file not found: $parametersFile"
        }
      }

      $resolvedTemplateFile = (Resolve-Path -LiteralPath $templateFile).Path
      $resolvedParametersFile = (Resolve-Path -LiteralPath $parametersFile).Path
      $compiledTemplateFile = $resolvedTemplateFile
      $compiledParametersFile = $resolvedParametersFile
      $parametersFileForCompilation = $resolvedParametersFile

      if ([System.IO.Path]::GetExtension($resolvedTemplateFile).Equals('.bicep', [System.StringComparison]::OrdinalIgnoreCase)) {
        $compiledTemplateFile = [System.IO.Path]::ChangeExtension($resolvedTemplateFile, '.json')
        az bicep build --file $resolvedTemplateFile --outfile $compiledTemplateFile
        if ($LASTEXITCODE -ne 0) {
          throw "Failed to compile template file: $resolvedTemplateFile"
        }
      }

      if ([System.IO.Path]::GetExtension($resolvedParametersFile).Equals('.bicepparam', [System.StringComparison]::OrdinalIgnoreCase)) {
        $parametersDirectory = Split-Path -Path $resolvedParametersFile -Parent
        $legacyMainPath = Join-Path $parametersDirectory 'main.bicep'
        $actualMainPath = Join-Path (Split-Path -Path $parametersDirectory -Parent) 'main.bicep'
        $parametersContent = Get-Content -LiteralPath $resolvedParametersFile -Raw

        if (-not (Test-Path -LiteralPath $legacyMainPath) -and (Test-Path -LiteralPath $actualMainPath) -and $parametersContent.Contains("using 'main.bicep'")) {
          $patchedParametersFile = Join-Path $parametersDirectory (([System.IO.Path]::GetFileNameWithoutExtension($resolvedParametersFile)) + '.autofix.bicepparam')
          $patchedParametersContent = $parametersContent.Replace("using 'main.bicep'", "using '../main.bicep'")
          Set-Content -LiteralPath $patchedParametersFile -Value $patchedParametersContent -NoNewline
          $parametersFileForCompilation = $patchedParametersFile
          Write-Warning "Patched legacy parameters file using-path for compilation: $patchedParametersFile"
        }

        $compiledParametersFile = Join-Path (Split-Path -Path $resolvedParametersFile -Parent) (([System.IO.Path]::GetFileNameWithoutExtension($resolvedParametersFile)) + '.parameters.json')
        az bicep build-params --file $parametersFileForCompilation --outfile $compiledParametersFile
        if ($LASTEXITCODE -ne 0) {
          throw "Failed to compile parameters file: $parametersFileForCompilation"
        }
      }

      Write-Host "Using template file: $resolvedTemplateFile"
      Write-Host "Using parameters file: $resolvedParametersFile"
      Write-Host "Using compiled template file: $compiledTemplateFile"
      Write-Host "Using compiled parameters file: $compiledParametersFile"
      Write-Host "##vso[task.setvariable variable=ResolvedTemplateFile]$compiledTemplateFile"
      Write-Host "##vso[task.setvariable variable=ResolvedParametersFile]$compiledParametersFile"
    displayName: 'Resolve deployment files'

  - task: AzureResourceManagerTemplateDeployment@3
    displayName: 'Validate - ${{ parameters.deploymentName }}'
    inputs:
      deploymentScope: 'Subscription'
      azureResourceManagerConnection: '${{ parameters.azureResourceManagerConnection }}'
      subscriptionId: '${{ parameters.subscriptionId }}'
      location: '${{ parameters.location }}'
      templateLocation: 'Linked artifact'
      csmFile: '$(ResolvedTemplateFile)'
      csmParametersFile: '$(ResolvedParametersFile)'
      overrideParameters: '${{ parameters.overrideParameters }}'
      deploymentMode: 'Validation'

  - task: AzureResourceManagerTemplateDeployment@3
    displayName: 'Deploy - ${{ parameters.deploymentName }}'
    inputs:
      deploymentScope: 'Subscription'
      azureResourceManagerConnection: '${{ parameters.azureResourceManagerConnection }}'
      subscriptionId: '${{ parameters.subscriptionId }}'
      location: '${{ parameters.location }}'
      templateLocation: 'Linked artifact'
      csmFile: '$(ResolvedTemplateFile)'
      csmParametersFile: '$(ResolvedParametersFile)'
      overrideParameters: '${{ parameters.overrideParameters }}'
      deploymentMode: 'Incremental'
      deploymentOutputs: 'armOutputs'

  - powershell: |
      $raw = '$(armOutputs)'
      if ([string]::IsNullOrWhiteSpace($raw) -or $raw -eq '$(armOutputs)') {
        Write-Host 'No ARM deployment outputs to parse — skipping.'
        return
      }
      $outputs = $raw | ConvertFrom-Json
      foreach ($key in $outputs.PSObject.Properties.Name) {
        $value = $outputs.$key.value
        Write-Host "##vso[task.setvariable variable=$key;isOutput=true]$value"
      }
    displayName: 'Parse ARM Deployment Outputs'
    name: armOutput
