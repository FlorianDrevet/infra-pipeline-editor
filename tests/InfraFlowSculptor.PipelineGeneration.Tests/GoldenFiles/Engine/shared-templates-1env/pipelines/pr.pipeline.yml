# Shared PR Validation Pipeline Template — Auto-generated by InfraFlowSculptor

parameters:
  - name: projectName
    type: string
    values:
      - core
  - name: bicepFiles
    type: object
    default: [ main.bicep ]
  - name: preparationSteps
    type: stepList
    default: []
  - name: additionalSteps
    type: stepList
    default: []

variables:
  - name: workingDirectory
    value: $(Build.SourcesDirectory)/${{ parameters.projectName }}

stages:
  - stage: validate
    displayName: Validate

    jobs:
      - job: validate
        displayName: Validate
        pool:
          vmImage: 'ubuntu-latest'

        steps:
          - ${{ parameters.preparationSteps }}

          - template: ../steps/checkout.step.yml
            parameters:
              directories:
                - .azuredevops
                - Common
                - ${{ parameters.projectName }}

          - powershell: |
              $configPath = "$(Build.SourcesDirectory)/bicepconfig.json"
              if (Test-Path $configPath) {
                $config = Get-Content -Path $configPath | ConvertFrom-Json
                $config.analyzers.core.rules.'use-recent-api-versions'.level = "warning"
                $config | ConvertTo-Json -Depth 99 | Set-Content -Path $configPath
              }
            displayName: Update Bicep Config
            name: UpdateBicepConfig

          - ${{ each bicepFile in parameters.bicepFiles }}:
            - script: |
                az bicep build --file "$(workingDirectory)/${{ bicepFile }}"
              displayName: Lint ${{ bicepFile }}

          - ${{ parameters.additionalSteps }}
