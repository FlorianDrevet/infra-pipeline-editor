# Release Pipeline — Auto-generated by InfraFlowSculptor
name: $(date:yyyyMMdd)

trigger: none

resources:
  pipelines:
    - pipeline: ci
      source: 'api - CI'
      trigger: none

variables:
  - name: environments
    value: dev

stages:
  - ${{ each environment in split(variables.environments, ',') }}:
      - stage: "Deploy_${{ environment }}"
        displayName: "Deploy ${{ environment }}"

        jobs:
          - template: ../Common/jobs/deploy.job.yml
            parameters:
              projectName: api
              environment: ${{ environment }}
              deployments:
                - displayName: "Deploy api Infrastructure"
                  deploymentName: api-infra-$(Build.BuildNumber)
                  templateFile: $(Pipeline.Workspace)/ci/drop/api/main.bicep
                  templateParametersFile: $(Pipeline.Workspace)/ci/drop/api/parameters/main.${{environment}}.bicepparam
