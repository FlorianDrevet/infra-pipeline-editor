# Release Pipeline — Auto-generated by InfraFlowSculptor
name: $(date:yyyyMMdd)

trigger: none

resources:
  pipelines:
    - pipeline: ci
      source: 'default - CI'
      trigger: none

variables:
  - name: environments
    value: dev

stages:
  - ${{ each environment in split(variables.environments, ',') }}:
      - stage: "Deploy_${{ environment }}"
        displayName: "Deploy ${{ environment }}"
        variables:
          - template: variables/${{ environment }}.yml
          - template: variables/vars.yml

        jobs:
          - template: ../.azuredevops/jobs/deploy.job.yml
            parameters:
              projectName: default
              environment: ${{ environment }}
              deployments:
                - displayName: "Deploy default Infrastructure"
                  deploymentName: default-infra-$(Build.BuildNumber)
                  templateFile: $(Pipeline.Workspace)/ci/drop/default/main.bicep
                  templateParametersFile: $(Pipeline.Workspace)/ci/drop/default/parameters/main.${{environment}}.bicepparam
